    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5280"
      # Đặt trong .env hoặc trên VPS, ví dụ cùng network Docker: Server=be_api_sqlserver,1433;...
      ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=SchoolBus;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      Jwt__Key: "mysupersecretkey1234567890abcdef"
      Jwt__Issuer: "YourAppName"
      Jwt__Audience: "YourAppAudience"
      Jwt__ExpireMinutes: "60"
    ports:
      - "5280:5280"
    restart: unless-stopped


services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schoolbus-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5280"
      ConnectionStrings__DefaultConnection: "Server=14.225.205.43,1433;Database=SchoolBus;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;"
      Jwt__Key: "mysupersecretkey1234567890abcdef"
      Jwt__Issuer: "YourAppName"
      Jwt__Audience: "YourAppAudience"
      Jwt__ExpireMinutes: "60"
      # Firebase Admin SDK (FCM) — file JSON trong ./firebase/ (mount vào /app/firebase)
      Firebase__Enabled: "true"
      Firebase__ProjectId: "schoolbus-ccd90"
      Firebase__CredentialsPath: "firebase/schoolbus-ccd90-firebase-adminsdk-fbsvc-eda64c6812.json"
      # Cho phép POST /api/FirebaseTest/Send không JWT khi chạy Production trong Docker (Swagger test FCM)
      Firebase__AllowPublicTestEndpoint: "true"
    ports:
      - "5280:5280"
    volumes:
      # Thư mục firebase/ chứa file Admin SDK JSON (đã gitignore); chỉ đọc trong container
      - ./firebase:/app/firebase:ro
    restart: unless-stopped